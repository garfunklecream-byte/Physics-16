<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physics-16 // COLLIDE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            margin: 0; background: #000; overflow: hidden;
            font-family: 'Press Start 2P', cursive; cursor: crosshair;
        }

        #crt {
            position: fixed; inset: 0; pointer-events: none; z-index: 100;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
        }

        canvas { display: block; image-rendering: pixelated; }

        .menu {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 200; color: #fff; text-align: center;
        }

        #ui-bar {
            position: absolute; top: 0; width: 100%; height: 50px;
            display: flex; align-items: center; justify-content: space-around;
            background: rgba(0,0,0,0.8); border-bottom: 2px solid #fff; 
            font-size: 8px; z-index: 50; color: #fff;
        }

        .btn {
            background: #222; border: 2px solid #fff; color: #fff;
            padding: 8px; margin: 4px; font-family: 'Press Start 2P';
            cursor: pointer; font-size: 8px;
        }
        .btn:hover { background: #fff; color: #000; }

        #shape-indicator {
            position: fixed; bottom: 20px; left: 20px; color: #00f2ff; font-size: 10px;
        }
    </style>
</head>
<body>

    <div id="crt"></div>
    <div id="shape-indicator">SHAPE: SQUARE (4)</div>

    <div id="main-menu" class="menu">
        <h1 style="color: #00f2ff;">PHYSICS-16</h1>
        <div style="background:#111; padding:20px; border:2px solid #fff; font-size:8px; line-height:2; max-width:500px;">
            > KEYS [0-5]: CHANGE SHAPE TYPE<br>
            > [LEFT CLICK]: SPAWN SHAPE<br>
            > [RIGHT CLICK]: EXPLODE<br>
            > [ESC]: THEMES / STYLES<br>
            > [G]: FLIP GRAVITY
        </div>
        <button class="btn" onclick="start()" style="margin-top:20px;">[ INITIALIZE ]</button>
    </div>

    <div id="pause-menu" class="menu" style="display:none;">
        <h2>SYSTEM_STYLES</h2>
        <div id="style-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin:20px;">
            </div>
        <button class="btn" onclick="togglePause()">CLOSE</button>
    </div>

    <div id="ui-bar">
        <div>OBJECTS: <span id="obj-count">0</span></div>
        <div id="grav-txt">GRAVITY: DOWN</div>
        <div>STILL ALIVE</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let gameActive = false, isPaused = false;
    let entities = [];
    let gravity = 0.4;
    let activeShape = 4; // Default Square

    const THEMES = [
        { name: "NEON", bg: "#000", primary: "#00f2ff", vir: "#ff0055" },
        { name: "RETRO", bg: "#2d142c", primary: "#ee4540", vir: "#801336" },
        { name: "MATRIX", bg: "#000", primary: "#00ff41", vir: "#003b00" },
        { name: "PAPER", bg: "#f0f0f0", primary: "#000", vir: "#444" },
        { name: "GOLD", bg: "#1a1a00", primary: "#ffd700", vir: "#fff" }
    ];
    let currentTheme = THEMES[0];

    // Setup Styles Menu
    const styleGrid = document.getElementById('style-grid');
    THEMES.forEach(t => {
        const b = document.createElement('button');
        b.className = 'btn'; b.innerText = t.name;
        b.onclick = () => { currentTheme = t; togglePause(); };
        styleGrid.appendChild(b);
    });

    function start() {
        document.getElementById('main-menu').style.display = 'none';
        gameActive = true;
        loop();
    }

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none';
    }

    window.addEventListener('keydown', e => {
        if(e.key === 'Escape') togglePause();
        if(e.key === 'g') gravity *= -1;
        if(['0','1','2','3','4','5'].includes(e.key)) {
            activeShape = parseInt(e.key);
            const names = ["CIRCLE", "DOT", "LINE", "TRIANGLE", "SQUARE", "PENTAGON"];
            document.getElementById('shape-indicator').innerText = `SHAPE: ${names[activeShape]} (${e.key})`;
        }
    });

    canvas.addEventListener('mousedown', e => {
        if(!gameActive || isPaused) return;
        if(e.button === 0) {
            spawn(e.clientX, e.clientY);
        }
    });

    canvas.oncontextmenu = (e) => {
        e.preventDefault();
        entities.forEach(b => {
            let dx = b.x - e.clientX; let dy = b.y - e.clientY;
            let dist = Math.hypot(dx, dy);
            if(dist < 250) { b.vx += (dx/dist)*15; b.vy += (dy/dist)*15; }
        });
    };

    function spawn(x, y) {
        entities.push({
            x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
            size: 15 + Math.random()*20, type: activeShape,
            rot: 0, vr: (Math.random()-0.5)*0.1
        });
    }

    function drawShape(ctx, b) {
        ctx.beginPath();
        if(b.type === 0) { // Circle
            ctx.arc(0, 0, b.size/2, 0, Math.PI*2);
        } else if(b.type === 1) { // Dot
            ctx.rect(-2, -2, 4, 4);
        } else if(b.type === 2) { // Line (Capsule)
            ctx.rect(-b.size/2, -4, b.size, 8);
        } else { // Polygons
            let sides = b.type;
            for(let i=0; i<sides; i++) {
                let angle = (i/sides) * Math.PI * 2;
                let px = Math.cos(angle) * (b.size/2);
                let py = Math.sin(angle) * (b.size/2);
                if(i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    }

    function update() {
        for(let i=0; i<entities.length; i++) {
            let b = entities[i];
            b.vy += gravity;
            b.x += b.vx; b.y += b.vy;
            b.rot += b.vr;

            // Wall Collisions
            if(b.x < b.size/2) { b.x = b.size/2; b.vx *= -0.5; }
            if(b.x > canvas.width - b.size/2) { b.x = canvas.width - b.size/2; b.vx *= -0.5; }
            if(b.y < b.size/2) { b.y = b.size/2; b.vy *= -0.5; }
            if(b.y > canvas.height - b.size/2) { b.y = canvas.height - b.size/2; b.vy *= -0.5; b.vx *= 0.95; }

            // Entity to Entity Collision (Simple Radius)
            for(let j=i+1; j<entities.length; j++) {
                let b2 = entities[j];
                let dx = b2.x - b.x; let dy = b2.y - b.y;
                let dist = Math.hypot(dx, dy);
                let minDist = (b.size/2) + (b2.size/2);
                
                if(dist < minDist) {
                    // Resolve overlap
                    let angle = Math.atan2(dy, dx);
                    let targetX = b.x + Math.cos(angle) * minDist;
                    let targetY = b.y + Math.sin(angle) * minDist;
                    let ax = (targetX - b2.x) * 0.5;
                    let ay = (targetY - b2.y) * 0.5;
                    b.vx -= ax; b.vy -= ay;
                    b2.vx += ax; b2.vy += ay;
                }
            }
        }
        if(entities.length > 200) entities.shift();
        document.getElementById('obj-count').innerText = entities.length;
    }

    function draw() {
        ctx.fillStyle = currentTheme.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        entities.forEach(b => {
            ctx.save();
            ctx.translate(b.x, b.y);
            ctx.rotate(b.rot);
            ctx.fillStyle = currentTheme.primary;
            ctx.strokeStyle = currentTheme.vir;
            ctx.lineWidth = 2;
            drawShape(ctx, b);
            ctx.restore();
        });
    }

    function loop() {
        if(gameActive && !isPaused) { update(); draw(); }
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
