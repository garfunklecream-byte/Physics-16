<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physics-16 // GIZMOS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; background: #010103; overflow: hidden; font-family: 'Press Start 2P', cursive; cursor: default; }
        #crt { position: fixed; inset: 0; pointer-events: none; z-index: 1000; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02)); background-size: 100% 4px, 4px 100%; }
        canvas { display: block; image-rendering: pixelated; }
        #console { position: fixed; bottom: 20px; left: 20px; width: 340px; padding: 15px; background: rgba(0, 10, 20, 0.95); border: 2px solid #00f2ff; z-index: 500; color: #00f2ff; }
        .stat { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 7px; }
        #mode-tag { text-align: center; padding: 5px; margin-top: 10px; background: #ff0055; color: #fff; font-size: 9px; }
        .menu { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; color: #fff; }
        .btn { background: transparent; border: 2px solid #00f2ff; color: #00f2ff; padding: 12px 24px; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>
<div id="crt"></div>
<div id="console">
    <div style="font-size: 10px; margin-bottom: 10px; border-bottom: 1px solid #00f2ff; padding-bottom: 5px;">GIZMO_DRIVE v6.0</div>
    <div class="stat"><span>L-CLICK:</span> <span>SELECT/DESELECT</span></div>
    <div class="stat"><span>V:</span> <span>PLACE SHAPE</span></div>
    <div class="stat"><span>B:</span> <span>SHOCKWAVE</span></div>
    <div class="stat"><span>X:</span> <span>HOLD TO DRAG</span></div>
    <div class="stat"><span>Z:</span> <span>ANCHOR/FREEZE</span></div>
    <div id="mode-tag">CHAOS_MODE</div>
</div>
<div id="main-menu" class="menu">
    <h1>PHYSICS-16</h1>
    <button class="btn" onclick="start()">LOAD GIZMOS</button>
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

let entities = [], constraints = [], shocks = [];
let gameActive = false, fineBuild = false, selected = null, secondary = null;
let gravity = 0.5, activeShape = 4, mouse = {x:0, y:0}, keys = {};

function start() { document.getElementById('main-menu').style.display = 'none'; gameActive = true; loop(); }

window.onkeydown = e => { 
    keys[e.key.toLowerCase()] = true;
    if(e.key === 'c' || e.key === 'C') {
        fineBuild = !fineBuild;
        document.getElementById('mode-tag').innerText = fineBuild ? "FINE_BUILD" : "CHAOS_MODE";
        document.getElementById('mode-tag').style.background = fineBuild ? "#00ff41" : "#ff0055";
    }
    if(e.key === 'v' || e.key === 'V') spawn(mouse.x, mouse.y);
    if(e.key === 'b' || e.key === 'B') shockwave(mouse.x, mouse.y);
    if(/[1-9]/.test(e.key)) activeShape = parseInt(e.key);
    
    if(fineBuild && selected) {
        if(e.key === 'z') selected.anchored = !selected.anchored;
        if(e.key === 'f') selected.rot += 0.2;
        // Constraint logic: Select A (Left click), then B (press H or J)
        if(e.key === 'h' || e.key === 'j') {
            let target = entities.find(b => b !== selected && Math.hypot(b.x-mouse.x, b.y-mouse.y) < b.size);
            if(target) constraints.push({a: selected, b: target, dist: Math.hypot(selected.x-target.x, selected.y-target.y), type: e.key==='h'?'rope':'strut'});
        }
    }
};
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };

canvas.onmousedown = e => {
    if(!gameActive) return;
    let hit = entities.find(b => Math.hypot(b.x - mouse.x, b.y - mouse.y) < b.size);
    selected = (selected === hit) ? null : hit; // Toggle selection
};

function spawn(x, y) {
    entities.push({ x, y, vx: 0, vy: 0, size: 35, type: activeShape, rot: 0, anchored: false });
}

function shockwave(x, y) {
    shocks.push({ x, y, r: 0, max: 250 });
    entities.forEach(b => {
        let d = Math.hypot(b.x-x, b.y-y);
        if(d < 250 && !b.anchored) { b.vx += (b.x-x)/d*20; b.vy += (b.y-y)/d*20; }
    });
}

function update() {
    constraints.forEach(c => {
        let dx = c.b.x - c.a.x, dy = c.b.y - c.a.y, d = Math.hypot(dx, dy);
        let diff = (c.dist - d) / d;
        if(c.type === 'rope' && d < c.dist) return;
        let ox = dx * diff * 0.5, oy = dy * diff * 0.5;
        if(!c.a.anchored) { c.a.x -= ox; c.a.y -= oy; }
        if(!c.b.anchored) { c.b.x += ox; c.b.y += oy; }
    });

    entities.forEach((b, i) => {
        if(keys['x'] && selected === b) { b.x = mouse.x; b.y = mouse.y; b.vx = 0; b.vy = 0; }
        if(b.anchored) { b.vx = 0; b.vy = 0; return; }
        
        b.vy += gravity; b.x += b.vx; b.y += b.vy;
        b.vx *= 0.98; b.vy *= 0.98;
        if(b.y > canvas.height - b.size/2) { b.y = canvas.height - b.size/2; b.vy *= -0.3; }

        for(let j=i+1; j<entities.length; j++){
            let b2 = entities[j], dx = b2.x-b.x, dy = b2.y-b.y, d = Math.hypot(dx,dy), min = (b.size+b2.size)/2;
            if(d < min) {
                let ang = Math.atan2(dy,dx), tx = b.x+Math.cos(ang)*min, ty = b.y+Math.sin(ang)*min;
                let ax = (tx-b2.x)*0.5, ay = (ty-b2.y)*0.5;
                if(!b.anchored){ b.vx -= ax; b.vy -= ay; }
                if(!b2.anchored){ b2.vx += ax; b2.vy += ay; }
            }
        }
    });
    shocks.forEach((s, i) => { s.r += 10; if(s.r > s.max) shocks.splice(i, 1); });
}

function draw() {
    ctx.fillStyle = '#010103'; ctx.fillRect(0,0,canvas.width,canvas.height);
    
    shocks.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.strokeStyle = '#fff'; ctx.stroke(); });

    constraints.forEach(c => {
        ctx.beginPath(); ctx.moveTo(c.a.x, c.a.y); ctx.lineTo(c.b.x, c.b.y);
        ctx.strokeStyle = c.type === 'rope' ? '#666' : '#00f2ff'; ctx.stroke();
    });

    entities.forEach(b => {
        ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rot);
        ctx.fillStyle = b.anchored ? '#555' : '#00f2ff';
        ctx.strokeStyle = (selected === b) ? '#ff0055' : '#fff';
        ctx.lineWidth = (selected === b) ? 4 : 2;
        
        ctx.beginPath();
        if(b.type === 1) ctx.rect(-4,-4,8,8);
        else {
            for(let i=0; i<b.type; i++){
                let a = i/b.type*Math.PI*2, px = Math.cos(a)*b.size/2, py = Math.sin(a)*b.size/2;
                if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
            }
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.restore();

        // GIZMOS
        if(fineBuild && selected === b) {
            ctx.strokeStyle = '#ff0055'; ctx.lineWidth = 2;
            // Move Gizmo
            ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x + 50, b.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x, b.y - 50); ctx.stroke();
            // Rotate Gizmo
            ctx.beginPath(); ctx.arc(b.x, b.y, b.size + 10, 0, Math.PI*2); ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
        }
    });
}

function loop() { if(gameActive) { update(); draw(); } requestAnimationFrame(loop); }
</script>
</body>
</html>
