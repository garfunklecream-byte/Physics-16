<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physics-16 // ENGINEER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            margin: 0; background: #010103; overflow: hidden;
            font-family: 'Press Start 2P', cursive; cursor: crosshair;
        }

        #crt {
            position: fixed; inset: 0; pointer-events: none; z-index: 1000;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 4px 100%;
        }

        canvas { display: block; image-rendering: pixelated; }

        #console {
            position: fixed; bottom: 20px; left: 20px;
            width: 320px; padding: 15px;
            background: rgba(0, 10, 20, 0.95);
            border: 2px solid #00f2ff;
            z-index: 500; color: #00f2ff;
        }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 7px; }
        .label { color: #55aaff; }
        .val { color: #fff; }

        #mode-tag {
            text-align: center; padding: 5px; margin-top: 10px;
            background: #00ff41; color: #000; font-size: 9px; font-weight: bold;
        }

        .menu {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 2000; color: #fff;
        }

        .btn {
            background: transparent; border: 2px solid #00f2ff; color: #00f2ff;
            padding: 12px 24px; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="crt"></div>

<div id="console">
    <div style="font-size: 10px; margin-bottom: 10px; border-bottom: 1px solid #00f2ff; padding-bottom: 5px;">ENGINEER_MODULE v5.0</div>
    <div class="stat-row"><span class="label">OBJECTS:</span> <span class="val" id="obj-count">0</span></div>
    <div class="stat-row"><span class="label">SHAPE:</span> <span class="val" id="shape-name">SQUARE (4)</span></div>
    <div class="stat-row"><span class="label">FINE BUILD:</span> <span class="val" id="build-status">OFF</span></div>
    <div class="stat-row"><span class="label">TOOLS:</span> <span class="val">F:ROT | G:MOVE | H:ROPE | J:STRUT</span></div>
    <div id="mode-tag">SYSTEM_READY</div>
</div>

<div id="main-menu" class="menu">
    <h1 style="color:#00f2ff;">PHYSICS-16</h1>
    <div style="background:#050510; padding:20px; border:1px solid #555; font-size:8px; line-height:2; margin-bottom:20px;">
        FINE BUILD (C) MUST BE ON FOR CONSTRAINTS:<br>
        1. Select Object (Hover + F or G)<br>
        2. Rope (H) / Strut (J): Click 2 objects to link<br>
        3. F: Rotate selected | G: Drag selected
    </div>
    <button class="btn" onclick="start()">LOAD ENGINE</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let entities = [], constraints = [], shocks = [];
let gameActive = false, fineBuild = false, selected = null, linking = null;
let gravity = 0.5, activeShape = 4, mouse = {x:0, y:0};

function start() { document.getElementById('main-menu').style.display = 'none'; gameActive = true; loop(); }

window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

window.addEventListener('keydown', e => {
    if(e.key === 'c' || e.key === 'C') { 
        fineBuild = !fineBuild;
        document.getElementById('build-status').innerText = fineBuild ? "ACTIVE" : "OFF";
        document.getElementById('mode-tag').style.background = fineBuild ? "#00ff41" : "#ff0055";
    }
    
    // Selection Logic
    if (fineBuild) {
        selected = entities.find(b => Math.hypot(b.x - mouse.x, b.y - mouse.y) < b.size);
        
        if (selected) {
            if (e.key === 'f') selected.rot += 0.2;
            if (e.key === 'g') { selected.x = mouse.x; selected.y = mouse.y; selected.vx = 0; selected.vy = 0; }
            
            // Constraint Start
            if (e.key === 'h' || e.key === 'j') {
                if (!linking) {
                    linking = { a: selected, type: e.key === 'h' ? 'rope' : 'strut' };
                } else if (linking.a !== selected) {
                    constraints.push({
                        a: linking.a, b: selected,
                        dist: Math.hypot(linking.a.x - selected.x, linking.a.y - selected.y),
                        type: linking.type
                    });
                    linking = null;
                }
            }
        }
    }

    if(/[1-9]/.test(e.key)) activeShape = parseInt(e.key);
});

canvas.addEventListener('mousedown', e => {
    if(!gameActive) return;
    if(e.button === 0) spawn(e.clientX, e.clientY);
});

function spawn(x, y) {
    entities.push({
        x, y, vx: fineBuild ? 0 : (Math.random()-0.5)*10, vy: fineBuild ? 0 : (Math.random()-0.5)*10,
        size: 30, type: activeShape, rot: 0, vr: 0
    });
}

function update() {
    // Constraint Physics (Verlet-ish)
    constraints.forEach(c => {
        let dx = c.b.x - c.a.x, dy = c.b.y - c.a.y, d = Math.hypot(dx, dy);
        let diff = (c.dist - d) / d;
        if (c.type === 'rope' && d < c.dist) return; // Ropes only pull
        let ox = dx * diff * 0.5, oy = dy * diff * 0.5;
        c.a.x -= ox; c.a.y -= oy; c.b.x += ox; c.b.y += oy;
    });

    entities.forEach((b, i) => {
        b.vy += gravity; b.x += b.vx; b.y += b.vy;
        b.vx *= 0.98; b.vy *= 0.98;

        if(b.y > canvas.height - b.size/2) { b.y = canvas.height - b.size/2; b.vy *= -0.3; }
        
        for(let j=i+1; j<entities.length; j++) {
            let b2 = entities[j], dx = b2.x - b.x, dy = b2.y - b.y, d = Math.hypot(dx, dy), min = (b.size+b2.size)/2;
            if(d < min) {
                let ang = Math.atan2(dy, dx), tx = b.x + Math.cos(ang)*min, ty = b.y + Math.sin(ang)*min;
                let ax = (tx - b2.x)*0.5, ay = (ty - b2.y)*0.5;
                b.vx -= ax; b.vy -= ay; b2.vx += ax; b2.vy += ay;
            }
        }
    });
    document.getElementById('obj-count').innerText = entities.length;
}

function draw() {
    ctx.fillStyle = '#010103'; ctx.fillRect(0,0,canvas.width,canvas.height);

    // Draw Constraints
    constraints.forEach(c => {
        ctx.beginPath(); ctx.moveTo(c.a.x, c.a.y); ctx.lineTo(c.b.x, c.b.y);
        ctx.strokeStyle = c.type === 'rope' ? '#aaa' : '#00f2ff';
        ctx.setLineDash(c.type === 'rope' ? [5, 5] : []);
        ctx.stroke();
    });

    entities.forEach(b => {
        ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rot);
        ctx.fillStyle = '#00f2ff'; ctx.strokeStyle = '#fff';
        if (fineBuild && Math.hypot(b.x - mouse.x, b.y - mouse.y) < b.size) ctx.fillStyle = '#ff0055';
        
        ctx.beginPath();
        if(b.type === 1) ctx.rect(-3,-3,6,6);
        else {
            for(let i=0; i<b.type; i++) {
                let a = (i/b.type)*Math.PI*2, px = Math.cos(a)*b.size/2, py = Math.sin(a)*b.size/2;
                if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
            }
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.restore();
    });
}

function loop() { if(gameActive) { update(); draw(); } requestAnimationFrame(loop); }
</script>
</body>
</html>
