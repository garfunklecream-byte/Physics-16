<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physics-16 // ARCHITECT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            margin: 0; background: #000; overflow: hidden;
            font-family: 'Press Start 2P', cursive; cursor: crosshair;
        }

        #crt {
            position: fixed; inset: 0; pointer-events: none; z-index: 1000;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
        }

        canvas { display: block; image-rendering: pixelated; }

        /* TOOLBAR BOTTOM LEFT */
        #toolbar {
            position: fixed; bottom: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 10px;
            background: rgba(0,0,0,0.8); border: 2px solid #fff;
            padding: 15px; z-index: 500;
        }

        .tool-label { font-size: 8px; color: #00f2ff; margin-bottom: 5px; }
        .mode-indicator { font-size: 10px; color: #ff0055; margin-top: 5px; }

        #ui-bar {
            position: absolute; top: 0; width: 100%; height: 40px;
            display: flex; align-items: center; justify-content: space-around;
            background: rgba(0,0,0,0.8); border-bottom: 2px solid #fff; 
            font-size: 8px; z-index: 500; color: #fff;
        }

        .menu {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 2000; color: #fff;
        }

        .btn {
            background: #222; border: 2px solid #fff; color: #fff;
            padding: 10px; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer;
        }
        .btn:hover { background: #fff; color: #000; }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake { 0%{transform:translate(2px,2px)} 50%{transform:translate(-2px,-2px)} }
    </style>
</head>
<body>

<div id="crt"></div>

<div id="toolbar">
    <div class="tool-label">SENSORS: ACTIVE</div>
    <div id="shape-name" style="font-size:9px;">SHAPE: SQUARE (4)</div>
    <div id="build-mode" class="mode-indicator">MODE: CHAOS</div>
    <div style="font-size:7px; color:#aaa; margin-top:5px;">[C] FINE BUILD | [G] GRAVITY</div>
</div>

<div id="ui-bar">
    <div>ENTITIES: <span id="obj-count">0</span></div>
    <div id="grav-txt">GRAVITY: 1.0G</div>
    <div>STABILITY: NOMINAL</div>
</div>

<div id="main-menu" class="menu">
    <h1 style="color:#00f2ff">PHYSICS-16</h1>
    <p style="font-size:8px; line-height:1.8;">PRESS [C] FOR PRECISION GIZMOS</p>
    <button class="btn" onclick="start()">INITIATE</button>
</div>

<div id="pause-menu" class="menu" style="display:none;">
    <h2>SYSTEM_STYLES</h2>
    <div id="style-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;"></div>
    <button class="btn" onclick="togglePause()" style="margin-top:20px;">RESUME</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let entities = [], shocks = [], particles = [];
let gameActive = false, isPaused = false, fineBuild = false;
let gravity = 0.4, activeShape = 4;

const THEMES = [
    { name: "NEON", bg: "#000", p: "#00f2ff", s: "#ff0055" },
    { name: "PAPER", bg: "#f0f0f0", p: "#000", s: "#555" },
    { name: "VOID", bg: "#050010", p: "#7000ff", s: "#00ffcc" }
];
let theme = THEMES[0];

// Audio
const audio = new (window.AudioContext || window.webkitAudioContext)();
function play(f, t, d, v=0.1) {
    const o = audio.createOscillator(), g = audio.createGain();
    o.type = t; o.frequency.value = f; g.gain.value = v;
    g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d);
    o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + d);
}

// Styles Menu
const grid = document.getElementById('style-grid');
THEMES.forEach(t => {
    const b = document.createElement('button'); b.className = 'btn'; b.innerText = t.name;
    b.onclick = () => { theme = t; togglePause(); }; grid.appendChild(b);
});

function start() { document.getElementById('main-menu').style.display = 'none'; gameActive = true; loop(); }
function togglePause() { isPaused = !isPaused; document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none'; }

window.addEventListener('keydown', e => {
    if(e.key === 'Escape') togglePause();
    if(e.key === 'g') { gravity *= -1; play(150, 'sine', 0.3); }
    if(e.key === 'c') { 
        fineBuild = !fineBuild; 
        document.getElementById('build-mode').innerText = fineBuild ? "MODE: FINE BUILD" : "MODE: CHAOS";
        document.getElementById('build-mode').style.color = fineBuild ? "#00ff41" : "#ff0055";
        play(600, 'square', 0.1);
    }
    if(/[0-9]/.test(e.key)) {
        activeShape = parseInt(e.key);
        const names = ["CIRCLE", "DOT", "LINE", "TRI", "SQR", "PENT", "HEX", "HEPT", "OCT", "NONA"];
        document.getElementById('shape-name').innerText = `SHAPE: ${names[activeShape]} (${e.key})`;
        play(800, 'sine', 0.05);
    }
});

canvas.addEventListener('mousedown', e => {
    if(!gameActive || isPaused) return;
    if(e.button === 0) spawn(e.clientX, e.clientY);
});

canvas.oncontextmenu = (e) => {
    e.preventDefault();
    shocks.push({ x: e.clientX, y: e.clientY, r: 10, max: 200 });
    entities.forEach(b => {
        let dx = b.x - e.clientX, dy = b.y - e.clientY, d = Math.hypot(dx, dy);
        if(d < 200) { b.vx += (dx/d)*25; b.vy += (dy/d)*25; }
    });
    play(60, 'sawtooth', 0.6, 0.2);
    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 150);
};

function spawn(x, y) {
    let count = fineBuild ? 1 : 3;
    for(let i=0; i<count; i++) {
        entities.push({
            x, y, vx: fineBuild ? 0 : (Math.random()-0.5)*15, vy: fineBuild ? 0 : (Math.random()-0.5)*15,
            size: fineBuild ? 40 : 15 + Math.random()*25, type: activeShape,
            rot: 0, vr: fineBuild ? 0 : (Math.random()-0.5)*0.2
        });
    }
    play(fineBuild ? 300 : 400, 'square', 0.1);
}

function update() {
    // Shocks
    shocks.forEach((s, i) => { s.r += 15; if(s.r > s.max) shocks.splice(i, 1); });

    // Entities
    for(let i=0; i<entities.length; i++) {
        let b = entities[i];
        if(!fineBuild || (fineBuild && Math.abs(b.vx) > 0.1)) {
            b.vy += gravity; b.vx *= 0.99; b.vy *= 0.99;
        }
        b.x += b.vx; b.y += b.vy; b.rot += b.vr;

        if(b.y > canvas.height - b.size/2) { b.y = canvas.height - b.size/2; b.vy *= -0.5; b.vx *= 0.8; }
        if(b.x < b.size/2 || b.x > canvas.width - b.size/2) { b.vx *= -0.8; b.x = b.x < b.size/2 ? b.size/2 : canvas.width - b.size/2; }

        for(let j=i+1; j<entities.length; j++) {
            let b2 = entities[j], dx = b2.x - b.x, dy = b2.y - b.y, d = Math.hypot(dx, dy), min = (b.size+b2.size)/2;
            if(d < min) {
                let ang = Math.atan2(dy, dx), tx = b.x + Math.cos(ang)*min, ty = b.y + Math.sin(ang)*min;
                let ax = (tx - b2.x)*0.5, ay = (ty - b2.y)*0.5;
                b.vx -= ax; b.vy -= ay; b2.vx += ax; b2.vy += ay;
            }
        }
    }
    if(entities.length > 150) entities.shift();
    document.getElementById('obj-count').innerText = entities.length;
}

function draw() {
    ctx.fillStyle = theme.bg; ctx.fillRect(0,0,canvas.width,canvas.height);

    // Shockwaves
    shocks.forEach(s => {
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.strokeStyle = theme.p; ctx.lineWidth = (1 - s.r/s.max)*5; ctx.stroke();
    });

    entities.forEach(b => {
        ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rot);
        ctx.fillStyle = theme.p; ctx.strokeStyle = theme.s; ctx.lineWidth = 2;
        
        // Gizmos for Fine Build
        if(fineBuild) {
            ctx.strokeStyle = "#fff"; ctx.setLineDash([2, 2]);
            ctx.strokeRect(-b.size/2-5, -b.size/2-5, b.size+10, b.size+10);
            ctx.setLineDash([]);
        }

        ctx.beginPath();
        if(b.type === 0) ctx.arc(0,0,b.size/2,0,Math.PI*2);
        else if(b.type === 1) ctx.rect(-2,-2,4,4);
        else if(b.type === 2) ctx.rect(-b.size/2,-2,b.size,4);
        else {
            for(let i=0; i<b.type; i++) {
                let a = (i/b.type)*Math.PI*2, px = Math.cos(a)*b.size/2, py = Math.sin(a)*b.size/2;
                if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
            }
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.restore();
    });
}

function loop() { if(gameActive && !isPaused) { update(); draw(); } requestAnimationFrame(loop); }
</script>
</body>
</html>
