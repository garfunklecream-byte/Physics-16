<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physics-16 // GEOMETRY GOD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body { 
            margin: 0; background: #010103; overflow: hidden; 
            font-family: 'Orbitron', sans-serif; cursor: crosshair; 
        }

        #crt {
            position: fixed; inset: 0; pointer-events: none; z-index: 1000;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
        }

        canvas { display: block; filter: saturate(1.2) brightness(1.1); }

        #dashboard {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: 110px; background: rgba(2, 2, 8, 0.98);
            border-top: 2px solid #00f2ff; display: flex;
            align-items: center; justify-content: space-around;
            padding: 0 20px; box-sizing: border-box; z-index: 500;
        }

        .stat-panel { color: #00f2ff; text-align: center; min-width: 120px; }
        .stat-label { font-size: 9px; text-transform: uppercase; opacity: 0.6; margin-bottom: 4px; }
        .stat-value { font-size: 16px; font-weight: bold; text-shadow: 0 0 8px #00f2ff; }

        .ability-bar { display: flex; gap: 8px; }
        .ability-slot {
            width: 55px; height: 55px; border: 1px solid #00f2ff;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; color: #00f2ff; font-size: 8px;
            transition: 0.1s; background: rgba(0, 242, 255, 0.03);
        }
        .ability-slot.active {
            background: #00f2ff; color: #000; box-shadow: 0 0 15px #00f2ff;
        }
        .ability-slot span { font-size: 14px; font-weight: bold; margin-bottom: 2px; }

        #hint { font-size: 9px; color: #00ff41; position: absolute; top: -25px; width: 100%; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="crt"></div>

<div id="dashboard">
    <div id="hint">[+/-]: CHANGE SIDES | L-CLICK: ABILITY | R-CLICK: BLAST | R: RESET</div>
    
    <div class="stat-panel">
        <div class="stat-label">ACTIVE SIDES</div>
        <div class="stat-value" id="side-count">4</div>
    </div>

    <div class="ability-bar">
        <div class="ability-slot" id="a1"><span>1</span>SPRAY</div>
        <div class="ability-slot" id="a2"><span>2</span>FLOAT</div>
        <div class="ability-slot" id="a3"><span>3</span>FREEZE</div>
        <div class="ability-slot active" id="a4"><span>4</span>SHAPE</div>
        <div class="ability-slot" id="a5"><span>5</span>PULL</div>
        <div class="ability-slot" id="a6"><span>6</span>MINE</div>
        <div class="ability-slot" id="a7"><span>7</span>TELE</div>
        <div class="ability-slot" id="a8"><span>8</span>CHAOS</div>
        <div class="ability-slot" id="a9" style="border-color:#ff0055; color:#ff0055;"><span>9</span>NUKE</div>
    </div>

    <div class="stat-panel">
        <div class="stat-label">ENTITY COUNT</div>
        <div class="stat-value" id="count">0</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 110;

let entities = [], shocks = [], mines = [];
let activeSlot = 4, polySides = 4;
let gravity = 0.6;
let mouse = {x:0, y:0};

window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };

window.oncontextmenu = (e) => {
    e.preventDefault();
    shockwave(e.clientX, e.clientY, 350, 40);
};

window.onmousedown = (e) => {
    if(e.button !== 0 || e.clientY > canvas.height) return;
    
    switch(activeSlot) {
        case 1: for(let i=0; i<15; i++) spawn(e.clientX, e.clientY, true); break; // Spray
        case 4: spawn(e.clientX, e.clientY); break; // Standard Shape
        case 6: mines.push({x: e.clientX, y: e.clientY, r: 20}); break; // Mine
        case 9: shockwave(e.clientX, e.clientY, 3000, 150); break; // Nuke
        default: spawn(e.clientX, e.clientY); break;
    }
};

window.onkeydown = e => {
    // 1-9 Abilities
    if(/[1-9]/.test(e.key)) {
        document.querySelectorAll('.ability-slot').forEach(s => s.classList.remove('active'));
        activeSlot = parseInt(e.key);
        document.getElementById('a'+e.key).classList.add('active');
    }
    // +/- Shape sides
    if(e.key === '+' || e.key === '=') { polySides = Math.min(20, polySides + 1); updateSideDisplay(); }
    if(e.key === '-' || e.key === '_') { polySides = Math.max(3, polySides - 1); updateSideDisplay(); }
    
    if(e.key === 'r' || e.key === 'R') { entities = []; mines = []; shocks = []; }
};

function updateSideDisplay() { document.getElementById('side-count').innerText = polySides; }

function spawn(x, y, burst=false) {
    entities.push({
        x, y,
        vx: burst ? (Math.random()-0.5)*50 : 0,
        vy: burst ? (Math.random()-0.5)*50 : 0,
        size: 15 + Math.random()*25,
        sides: polySides,
        rot: 0, vr: (Math.random()-0.5)*0.3,
        hue: Math.random()*360
    });
}

function shockwave(x, y, radius, power) {
    shocks.push({ x, y, r: 0, max: radius });
    entities.forEach(b => {
        let dx = b.x - x, dy = b.y - y, d = Math.hypot(dx, dy);
        if(d < radius) {
            let f = (1 - d/radius) * power;
            b.vx += (dx/d) * f; b.vy += (dy/d) * f;
        }
    });
}

function update() {
    entities.forEach((b, i) => {
        // Ability Logic
        if(activeSlot === 2) b.vy -= 1.2; // Float
        if(activeSlot === 3) { b.vx *= 0.1; b.vy *= 0.1; b.vr *= 0.1; } // Freeze
        if(activeSlot === 5) { // Pull (Vacuum)
            let dx = mouse.x - b.x, dy = mouse.y - b.y, d = Math.hypot(dx, dy);
            if(d > 5) { b.vx += dx/d * 1.5; b.vy += dy/d * 1.5; }
        }
        if(activeSlot === 7) { // Teleport (Loop to top)
             if(b.y > canvas.height - 40) { b.y = 50; b.vx *= 1.5; }
        }
        if(activeSlot === 8) { b.vx += (Math.random()-0.5)*15; b.vy += (Math.random()-0.5)*15; } // Chaos

        b.vy += gravity; b.x += b.vx; b.y += b.vy; b.rot += b.vr;
        b.vx *= 0.99; b.vy *= 0.99;

        // BOUNDS (Solid Box)
        if(b.y > canvas.height - b.size/2) { b.y = canvas.height - b.size/2; b.vy *= -0.7; }
        if(b.y < b.size/2) { b.y = b.size/2; b.vy *= -0.7; }
        if(b.x > canvas.width - b.size/2) { b.x = canvas.width - b.size/2; b.vx *= -0.7; }
        if(b.x < b.size/2) { b.x = b.size/2; b.vx *= -0.7; }

        // Mine Collision
        mines.forEach((m, mi) => {
            if(Math.hypot(b.x-m.x, b.y-m.y) < b.size/2 + m.r) {
                shockwave(m.x, m.y, 500, 60);
                mines.splice(mi, 1);
            }
        });

        // Object Collision
        for(let j=i+1; j<entities.length; j++){
            let b2 = entities[j], dx = b2.x-b.x, dy = b2.y-b.y, d = Math.hypot(dx,dy), min = (b.size+b2.size)/2;
            if(d < min) {
                let ang = Math.atan2(dy,dx), tx = b.x+Math.cos(ang)*min, ty = b.y+Math.sin(ang)*min;
                let ax = (tx-b2.x)*0.5, ay = (ty-b2.y)*0.5;
                b.vx -= ax; b.vy -= ay; b2.vx += ax; b2.vy += ay;
            }
        }
    });

    shocks.forEach((s, i) => { s.r += 25; if(s.r > s.max) shocks.splice(i, 1); });
    document.getElementById('count').innerText = entities.length;
}

function draw() {
    ctx.fillStyle = '#010103'; ctx.fillRect(0, 0, canvas.width, canvas.height);

    mines.forEach(m => {
        ctx.fillStyle = '#ff0055'; ctx.shadowBlur = 15; ctx.shadowColor = '#ff0055';
        ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    });

    shocks.forEach(s => {
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(0, 242, 255, ${1 - s.r/s.max})`;
        ctx.lineWidth = 4; ctx.stroke();
    });

    entities.forEach(b => {
        ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rot);
        let color = `hsl(${b.hue}, 100%, 60%)`;
        ctx.fillStyle = color; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
        ctx.shadowBlur = 10; ctx.shadowColor = color;
        
        ctx.beginPath();
        for(let i=0; i<b.sides; i++){
            let a = i/b.sides*Math.PI*2, px = Math.cos(a)*b.size/2, py = Math.sin(a)*b.size/2;
            if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.restore();
    });
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
