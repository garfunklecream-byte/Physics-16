<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physics-16 // COLLIDE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            margin: 0; background: #000; overflow: hidden;
            font-family: 'Press Start 2P', cursive; cursor: crosshair;
        }

        #crt {
            position: fixed; inset: 0; pointer-events: none; z-index: 100;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
        }

        canvas { display: block; image-rendering: pixelated; }

        .menu {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 200; color: #fff; text-align: center;
        }

        #ui-bar {
            position: absolute; top: 0; width: 100%; height: 50px;
            display: flex; align-items: center; justify-content: space-around;
            background: rgba(0,0,0,0.8); border-bottom: 2px solid #fff; 
            font-size: 8px; z-index: 50; color: #fff;
        }

        .btn {
            background: #222; border: 2px solid #fff; color: #fff;
            padding: 12px; margin: 5px; font-family: 'Press Start 2P';
            cursor: pointer; font-size: 10px;
        }
        .btn:hover { background: #fff; color: #000; }

        #shape-indicator {
            position: fixed; bottom: 20px; left: 20px; color: #00f2ff; font-size: 10px; z-index: 50;
            background: rgba(0,0,0,0.5); padding: 5px;
        }
    </style>
</head>
<body>

    <div id="crt"></div>
    <div id="shape-indicator">SHAPE: SQUARE (4)</div>

    <div id="main-menu" class="menu">
        <h1 style="color: #ff0055; font-size: 40px;">PHYSICS-16</h1>
        <div style="background:#111; padding:25px; border:4px double #fff; font-size:9px; line-height:2; max-width:600px;">
            <p style="color:#00f2ff">== OPERATOR INSTRUCTIONS ==</p>
            > [0-5]: SWAP SHAPES (Circle to Pentagon)<br>
            > [LEFT CLICK]: SPAWN OBJECTS<br>
            > [RIGHT CLICK]: TRIGGER SHOCKWAVE<br>
            > [G]: REVERSE GRAVITY<br>
            > [ESC]: CHANGE SYSTEM STYLES (FREE)
        </div>
        <button class="btn" onclick="start()" style="margin-top:25px;">[ BOOT_SANDBOX ]</button>
    </div>

    <div id="pause-menu" class="menu" style="display:none;">
        <h2 style="color:#00f2ff">SYSTEM_STYLES</h2>
        <div id="style-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin:20px;">
            </div>
        <button class="btn" onclick="togglePause()">RESUME</button>
    </div>

    <div id="ui-bar">
        <div>OBJECTS: <span id="obj-count">0</span></div>
        <div id="grav-txt" style="color:#ff0055">GRAVITY: DOWN</div>
        <div>PHYSICS-16 v2.0</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let gameActive = false, isPaused = false;
    let entities = [];
    let gravity = 0.5;
    let activeShape = 4; // Default Square

    const THEMES = [
        { name: "CYBER", bg: "#000", primary: "#00f2ff", secondary: "#ff0055" },
        { name: "RETRO", bg: "#2d142c", primary: "#ee4540", secondary: "#801336" },
        { name: "MATRIX", bg: "#000", primary: "#00ff41", secondary: "#003b00" },
        { name: "GOLD", bg: "#1a1a00", primary: "#ffd700", secondary: "#fff" },
        { name: "GHOST", bg: "#fff", primary: "#222", secondary: "#aaa" },
        { name: "VAPOR", bg: "#1a002e", primary: "#ff71ce", secondary: "#01cdfe" }
    ];
    let currentTheme = THEMES[0];

    // Populate Styles
    const styleGrid = document.getElementById('style-grid');
    THEMES.forEach(t => {
        const b = document.createElement('button');
        b.className = 'btn'; b.innerText = t.name;
        b.onclick = () => { currentTheme = t; togglePause(); };
        styleGrid.appendChild(b);
    });

    function start() {
        document.getElementById('main-menu').style.display = 'none';
        gameActive = true;
        loop();
    }

    function togglePause() {
        if(!gameActive) return;
        isPaused = !isPaused;
        document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none';
    }

    window.addEventListener('keydown', e => {
        if(e.key === 'Escape') togglePause();
        if(e.key === 'g' || e.key === 'G') {
            gravity *= -1;
            document.getElementById('grav-txt').innerText = gravity > 0 ? "GRAVITY: DOWN" : "GRAVITY: UP";
        }
        if(['0','1','2','3','4','5'].includes(e.key)) {
            activeShape = parseInt(e.key);
            const names = ["CIRCLE", "DOT", "LINE", "TRIANGLE", "SQUARE", "PENTAGON"];
            document.getElementById('shape-indicator').innerText = `SHAPE: ${names[activeShape]} (${e.key})`;
        }
    });

    canvas.addEventListener('mousedown', e => {
        if(!gameActive || isPaused) return;
        if(e.button === 0) spawn(e.clientX, e.clientY);
    });

    canvas.oncontextmenu = (e) => {
        e.preventDefault();
        entities.forEach(b => {
            let dx = b.x - e.clientX; let dy = b.y - e.clientY;
            let dist = Math.hypot(dx, dy);
            if(dist < 300) { b.vx += (dx/dist)*20; b.vy += (dy/dist)*20; }
        });
    };

    function spawn(x, y) {
        for(let i=0; i<2; i++) { // Spawn 2 at a time for chaos
            entities.push({
                x, y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15,
                size: 15 + Math.random()*25, type: activeShape,
                rot: 0, vr: (Math.random()-0.5)*0.15
            });
        }
    }

    function drawPolygon(ctx, b) {
        ctx.beginPath();
        if(b.type === 0) { // Circle
            ctx.arc(0, 0, b.size/2, 0, Math.PI*2);
        } else if(b.type === 1) { // Dot
            ctx.rect(-3, -3, 6, 6);
        } else if(b.type === 2) { // Line
            ctx.rect(-b.size/2, -3, b.size, 6);
        } else { // Poly
            let sides = b.type;
            for(let i=0; i<sides; i++) {
                let angle = (i/sides) * Math.PI * 2;
                let px = Math.cos(angle) * (b.size/2);
                let py = Math.sin(angle) * (b.size/2);
                if(i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
        }
        ctx.closePath();
        ctx.fill(); ctx.stroke();
    }

    function update() {
        for(let i=0; i<entities.length; i++) {
            let b = entities[i];
            b.vy += gravity;
            b.x += b.vx; b.y += b.vy;
            b.rot += b.vr;

            // Screen Bounds
            if(b.x < b.size/2) { b.x = b.size/2; b.vx *= -0.6; }
            if(b.x > canvas.width - b.size/2) { b.x = canvas.width - b.size/2; b.vx *= -0.6; }
            if(b.y < b.size/2) { b.y = b.size/2; b.vy *= -0.6; }
            if(b.y > canvas.height - b.size/2) { b.y = canvas.height - b.size/2; b.vy *= -0.6; b.vx *= 0.98; }

            // Collision (Circle vs Circle math for all shapes for speed)
            for(let j=i+1; j<entities.length; j++) {
                let b2 = entities[j];
                let dx = b2.x - b.x;
                let dy = b2.y - b.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let min = (b.size/2) + (b2.size/2);
                
                if(dist < min) {
                    let angle = Math.atan2(dy, dx);
                    let tx = b.x + Math.cos(angle) * min;
                    let ty = b.y + Math.sin(angle) * min;
                    let ax = (tx - b2.x) * 0.4;
                    let ay = (ty - b2.y) * 0.4;
                    b.vx -= ax; b.vy -= ay;
                    b2.vx += ax; b2.vy += ay;
                }
            }
        }
        if(entities.length > 150) entities.shift();
        document.getElementById('obj-count').innerText = entities.length;
    }

    function draw() {
        ctx.fillStyle = currentTheme.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        entities.forEach(b => {
            ctx.save();
            ctx.translate(b.x, b.y);
            ctx.rotate(b.rot);
            ctx.fillStyle = currentTheme.primary;
            ctx.strokeStyle = currentTheme.secondary;
            ctx.lineWidth = 3;
            drawPolygon(ctx, b);
            ctx.restore();
        });
    }

    function loop() {
        if(gameActive && !isPaused) { update(); draw(); }
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
