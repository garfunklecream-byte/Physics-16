<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physics-16 // ULTIMATUM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body { 
            margin: 0; background: #020205; overflow: hidden; 
            font-family: 'Orbitron', sans-serif; cursor: crosshair; 
        }

        #crt-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 1000;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
        }

        canvas { display: block; filter: contrast(1.1) brightness(1.1); }

        /* BOTTOM DASHBOARD */
        #dashboard {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: 100px; background: rgba(5, 5, 15, 0.95);
            border-top: 2px solid #00f2ff; display: flex;
            align-items: center; justify-content: space-around;
            padding: 0 20px; box-sizing: border-box; z-index: 500;
            box-shadow: 0 -10px 30px rgba(0, 242, 255, 0.15);
        }

        .stat-panel { color: #00f2ff; text-align: center; }
        .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
        .stat-value { font-size: 18px; font-weight: bold; text-shadow: 0 0 10px #00f2ff; }

        .ability-bar { display: flex; gap: 10px; }
        .ability-slot {
            width: 50px; height: 50px; border: 1px solid #00f2ff;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; color: #00f2ff; font-size: 9px;
            transition: 0.2s; background: rgba(0, 242, 255, 0.05);
        }
        .ability-slot.active {
            background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff;
        }
        .ability-slot span { font-size: 14px; font-weight: bold; }

        #hint { font-size: 9px; color: #ff0055; position: absolute; top: -25px; width: 100%; text-align: center; }
    </style>
</head>
<body>

<div id="crt-overlay"></div>

<div id="dashboard">
    <div id="hint">L-CLICK: USE ABILITY | R-CLICK: EXPLOSION | R: CLEAR</div>
    
    <div class="stat-panel">
        <div class="stat-label">System Load</div>
        <div class="stat-value" id="count">0</div>
    </div>

    <div class="ability-bar" id="bar">
        <div class="ability-slot" id="a1"><span>1</span>CLSTR</div>
        <div class="ability-slot" id="a2"><span>2</span>AGRAV</div>
        <div class="ability-slot" id="a3"><span>3</span>STOP</div>
        <div class="ability-slot active" id="a4"><span>4</span>SQR</div>
        <div class="ability-slot" id="a5"><span>5</span>VAC</div>
        <div class="ability-slot" id="a6"><span>6</span>PENT</div>
        <div class="ability-slot" id="a7"><span>7</span>MINE</div>
        <div class="ability-slot" id="a8"><span>8</span>MIX</div>
        <div class="ability-slot" id="a9" style="border-color:#ff0055; color:#ff0055;"><span>9</span>NUKE</div>
    </div>

    <div class="stat-panel">
        <div class="stat-label">Engine Stat</div>
        <div class="stat-value" style="color:#00ff41">STABLE</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 100; // Subtract dashboard height

let entities = [], shocks = [], mines = [];
let activeSlot = 4;
let gravity = 0.65;

window.oncontextmenu = (e) => {
    e.preventDefault();
    shockwave(e.clientX, e.clientY, 350, 35);
};

window.onmousedown = (e) => {
    if(e.button !== 0 || e.clientY > canvas.height) return;
    
    if(activeSlot === 1) for(let i=0; i<12; i++) spawn(e.clientX, e.clientY, true, 4);
    else if(activeSlot === 4) spawn(e.clientX, e.clientY, false, 4);
    else if(activeSlot === 6) spawn(e.clientX, e.clientY, false, 5);
    else if(activeSlot === 7) mines.push({x: e.clientX, y: e.clientY, r: 18});
    else if(activeSlot === 9) shockwave(e.clientX, e.clientY, 2500, 120);
    else spawn(e.clientX, e.clientY, false, activeSlot);
};

window.onkeydown = e => {
    if(/[1-9]/.test(e.key)) {
        document.querySelectorAll('.ability-slot').forEach(s => s.classList.remove('active'));
        activeSlot = parseInt(e.key);
        document.getElementById('a'+e.key).classList.add('active');
    }
    if(e.key === 'r' || e.key === 'R') { entities = []; mines = []; shocks = []; }
};

function spawn(x, y, burst=false, type=4) {
    entities.push({
        x, y,
        vx: burst ? (Math.random()-0.5)*40 : 0,
        vy: burst ? (Math.random()-0.5)*40 : 0,
        size: 20 + Math.random()*20,
        type: type,
        rot: 0, vr: (Math.random()-0.5)*0.25,
        hue: Math.random()*360
    });
}

function shockwave(x, y, radius, power) {
    shocks.push({ x, y, r: 0, max: radius });
    entities.forEach(b => {
        let dx = b.x - x, dy = b.y - y, d = Math.hypot(dx, dy);
        if(d < radius) {
            let force = (1 - d/radius) * power;
            b.vx += (dx/d) * force; b.vy += (dy/d) * force;
        }
    });
}

function update() {
    entities.forEach((b, i) => {
        // Mode logic
        if(activeSlot === 2) b.vy -= 1.3; // Anti-Grav
        if(activeSlot === 5) { // Vacuum
            let dx = window.event?.clientX || canvas.width/2 - b.x;
            let dy = window.event?.clientY || canvas.height/2 - b.y;
            let d = Math.hypot(dx, dy);
            b.vx += dx/d * 1.8; b.vy += dy/d * 1.8;
        }
        if(activeSlot === 8) { b.vx += (Math.random()-0.5)*12; b.vy += (Math.random()-0.5)*12; }
        if(activeSlot === 3) { b.vx *= 0.05; b.vy *= 0.05; }

        b.vy += gravity; b.x += b.vx; b.y += b.vy; b.rot += b.vr;
        b.vx *= 0.985; b.vy *= 0.985;

        // BOUNDS (Top, Bottom, Left, Right)
        if(b.y > canvas.height - b.size/2) { b.y = canvas.height - b.size/2; b.vy *= -0.65; }
        if(b.y < b.size/2) { b.y = b.size/2; b.vy *= -0.65; }
        if(b.x > canvas.width - b.size/2) { b.x = canvas.width - b.size/2; b.vx *= -0.65; }
        if(b.x < b.size/2) { b.x = b.size/2; b.vx *= -0.65; }

        // Mine Collision
        mines.forEach((m, mi) => {
            if(Math.hypot(b.x-m.x, b.y-m.y) < b.size/2 + m.r) {
                shockwave(m.x, m.y, 450, 50);
                mines.splice(mi, 1);
            }
        });

        // Shape Collision
        for(let j=i+1; j<entities.length; j++){
            let b2 = entities[j], dx = b2.x-b.x, dy = b2.y-b.y, d = Math.hypot(dx,dy), min = (b.size+b2.size)/2;
            if(d < min) {
                let ang = Math.atan2(dy,dx), tx = b.x+Math.cos(ang)*min, ty = b.y+Math.sin(ang)*min;
                let ax = (tx-b2.x)*0.5, ay = (ty-b2.y)*0.5;
                b.vx -= ax; b.vy -= ay; b2.vx += ax; b2.vy += ay;
            }
        }
    });

    shocks.forEach((s, i) => { s.r += 22; if(s.r > s.max) shocks.splice(i, 1); });
    document.getElementById('count').innerText = entities.length;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Mines
    mines.forEach(m => {
        ctx.shadowBlur = 15; ctx.shadowColor = '#ff0055';
        ctx.fillStyle = '#ff0055'; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    });

    // Shockwaves
    shocks.forEach(s => {
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(0, 242, 255, ${1 - s.r/s.max})`;
        ctx.lineWidth = 3; ctx.stroke();
    });

    // Shapes
    entities.forEach(b => {
        ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rot);
        ctx.shadowBlur = 10; ctx.shadowColor = `hsl(${b.hue}, 100%, 50%)`;
        ctx.fillStyle = `hsl(${b.hue}, 100%, 50%)`;
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
        
        ctx.beginPath();
        if(b.type === 1 || b.type === 4) ctx.rect(-b.size/2, -b.size/2, b.size, b.size);
        else {
            for(let i=0; i<b.type; i++){
                let a = i/b.type*Math.PI*2, px = Math.cos(a)*b.size/2, py = Math.sin(a)*b.size/2;
                if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
            }
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.restore();
    });
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
